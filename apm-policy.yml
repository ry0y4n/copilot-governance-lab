name: "Starter GitHub Copilot customization policy"
version: "1.0.0"
enforcement: warn
dependencies:
    allow:
        - "microsoft/*"
        - "your-org/*"
    deny:
        - "untrusted-org/*"
mcp:
    allow:
        - "microsoft/*"
    transport:
        allow:
            - "stdio"
compilation:
    target:
        allow:
            - "copilot"
        enforce: true
